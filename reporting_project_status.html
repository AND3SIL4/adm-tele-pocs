<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Métricas Desarrollo — 27/03/2026</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: system-ui, sans-serif;
            background: #f5f5f2;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            padding: 2rem;
        }

        .report-wrap {
            background: #fff;
            border-radius: 12px;
            padding: 1.5rem;
            max-width: 480px;
            width: 100%;
            box-shadow: 0 1px 4px rgba(0, 0, 0, 0.08);
        }

        .report-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 1.5rem;
        }

        .report-title {
            font-size: 18px;
            font-weight: 500;
            color: #1a1a18;
        }

        .report-date {
            font-size: 13px;
            color: #888780;
        }

        .kpi-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 12px;
            margin-bottom: 12px;
        }

        .kpi-card {
            background: #f1efe8;
            border-radius: 8px;
            padding: 1rem 1.25rem;
        }

        .kpi-label {
            font-size: 12px;
            color: #888780;
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.04em;
        }

        .kpi-value {
            font-size: 28px;
            font-weight: 500;
            color: #1a1a18;
        }

        .kpi-value.negative {
            color: #A32D2D;
        }

        .kpi-subtext {
            font-size: 12px;
            color: #888780;
            margin-top: 4px;
        }

        .bar-wrap {
            margin-top: 10px;
        }

        .bar-track {
            height: 6px;
            background: rgba(0, 0, 0, 0.1);
            border-radius: 3px;
            overflow: hidden;
        }

        .bar-fill {
            height: 100%;
            border-radius: 3px;
        }

        .bar-labels {
            display: flex;
            justify-content: space-between;
            font-size: 11px;
            color: #888780;
            margin-top: 3px;
        }

        .deviation-card {
            background: #f1efe8;
            border-radius: 0 8px 8px 0;
            padding: 1rem 1.25rem;
            border-left: 3px solid #E24B4A;
        }

        .deviation-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .dev-item {
            flex: 1;
        }

        .dev-divider {
            width: 0.5px;
            background: rgba(0, 0, 0, 0.12);
            align-self: stretch;
            margin: 0 1rem;
        }
    </style>
</head>

<body>
    <div class="report-wrap">
        <div class="report-header">
            <span class="report-title">Métricas Desarrollo</span>
            <span class="report-date">16/03/2026</span>
        </div>

        <div class="kpi-grid">
            <div class="kpi-card">
                <div class="kpi-label">Meta</div>
                <div class="kpi-value">60%</div>
                <div class="bar-wrap">
                    <div class="bar-track">
                        <div class="bar-fill" style="width: 60%; background: #185FA5;"></div>
                    </div>
                    <div class="bar-labels"><span>0%</span><span>100%</span></div>
                </div>
            </div>

            <div class="kpi-card">
                <div class="kpi-label">Avance real</div>
                <div class="kpi-value">55%</div>
                <div class="bar-wrap">
                    <div class="bar-track">
                        <div class="bar-fill" style="width: 55%; background: #1D9E75;"></div>
                    </div>
                    <div class="bar-labels"><span>0%</span><span>100%</span></div>
                </div>
            </div>
        </div>

        <div class="deviation-card">
            <div class="kpi-label" style="margin-bottom: 10px;">Desviación</div>
            <div class="deviation-row">
                <div class="dev-item">
                    <div style="font-size: 11px; color: #888780; margin-bottom: 3px;">Porcentual</div>
                    <div class="kpi-value negative" style="font-size: 24px;">−5%</div>
                    <div class="kpi-subtext">meta vs. avance</div>
                </div>
                <div class="dev-divider"></div>
                <div class="dev-item" style="padding-left: 0.25rem;">
                    <div style="font-size: 11px; color: #888780; margin-bottom: 3px;">Absoluta</div>
                    <div class="kpi-value negative" style="font-size: 24px;">1</div>
                    <div class="kpi-subtext">días</div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
